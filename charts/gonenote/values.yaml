# -- Number of app replicas
replicaCount: 1

image:
  repository: gonenote
  tag: latest
  pullPolicy: IfNotPresent

# -- Generate on first install and keep: openssl rand -hex 32
secretKey: ""

app:
  port: 3000
  maxNoteLength: "102400"
  defaultTtl: "604800"

# Whitelabel branding (all optional — unset = GoneNote defaults)
branding:
  name: ""
  logoUrl: ""
  colors:
    root: ""
    surface: ""
    elevated: ""
    border: ""
    primary: ""
    secondary: ""
    muted: ""
    accent: ""
    accentHover: ""
    success: ""
    error: ""

redis:
  image: redis:7-alpine
  port: 6379
  # -- Redis is ephemeral — no persistence. All data lives in-memory and is
  # destroyed by GETDEL or TTL expiry. AOF and RDB are disabled.
  args:
    - redis-server
    - --save
    - ""
    - --appendonly
    - "no"
    - --maxmemory-policy
    - noeviction
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    memory: 256Mi
    cpu: 500m

# -- Route traffic via standard Ingress (set enabled: true)
ingress:
  enabled: false
  className: traefik
  host: gonenote.example.com
  tlsSecretName: ""

# -- Route traffic via Gateway API (set enabled: true)
gateway:
  enabled: false
  gatewayName: default-gateway
  namespace: default
  host: gonenote.example.com
