services:
  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-fa6c697a47d1390f9e306033e5fff1b6c08a64125a788d80fc09a27f7c29d8dc}
      REDIS_URL: redis://redis:6379
      MAX_NOTE_LENGTH: ${MAX_NOTE_LENGTH:-102400}
      DEFAULT_TTL: ${DEFAULT_TTL:-604800}
      # Whitelabel branding (all optional)
      APP_NAME: ${APP_NAME:-GoneNote}
      # APP_LOGO_URL:
      # APP_COLOR_ROOT: "#0a0a0f"
    depends_on:
      redis:
        condition: service_healthy
